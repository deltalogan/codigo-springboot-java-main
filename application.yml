# ==================== PERFIL LOCAL-SYBASE ====================
---
spring:
  config:
    activate:
      on-profile: local-sybase
  datasource:
    url: jdbc:jtds:sybase://${DB_HOST:localhost}:${DB_PORT:4100}/${DB_NAME:prestaci}
    driver-class-name: net.sourceforge.jtds.jdbc.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-test-query: SELECT 1
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 30000